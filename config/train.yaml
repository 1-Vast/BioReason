# BioReason training hyperparameters

train:
  stage: 1
  epochs: 100
  batch_size: 128
  lr: 0.0005
  weight_decay: 0.0001
  amp: true
  grad_clip: 1.0
  device: "cuda"
  seed: 42
  save_dir: "output"
  target_latent: null
  latent_only: false

  # performance
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  non_blocking: true
  progress: true
  log_every: 20
  profile: false
  profile_batches: 20
  monitor_gpu: true
  empty_cache: false
  compile: false
  avoid_single_batch: true
