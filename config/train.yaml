# BioReason training hyperparameters

train:
  stage: 1
  epochs: 100
  batch_size: 128
  lr: 0.0005
  weight_decay: 0.0001
  amp: true
  grad_clip: 1.0
  device: "cuda"
  seed: 42
  save_dir: "output"
  target_latent: null
  latent_only: false
  evi_warm: true
  evi_warm_epochs: 10
  evi_warm_margin: 0.02
  evi_log: true
  latent_only_bp: true
  latent_only_modules:
    - reasoner
    - evidence_encoder
    - evidence_head
    - pert_encoder
    - cov_encoder
  stage3_init: "stage1"
  stage1_ckpt: "output/stage1/model.pt"
  stage2_ckpt: "output/stage2/model.pt"

  # performance
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  non_blocking: true
  progress: true
  log_every: 20
  profile: false
  profile_batches: 20
  monitor_gpu: true
  empty_cache: false
  compile: false
  avoid_single_batch: true
