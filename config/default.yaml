# BioReason default configuration

project:
  name: "BioReason"
  task: "single-cell perturbation prediction"
  idea: "evidence-guided latent biological reasoning"

data:
  h5ad: ""
  label_key: "perturbation"
  control_label: "control"
  cell_type_key: "cell_type"
  dose_key: "dose"
  time_key: "time"
  batch_key: "batch"
  evidence_key: "evidence"
  target_mode: "group_mean"
  pair_by: "cell_type"
  use_control_as_input: true
  use_hvg: true
  n_hvg: 2000
  cache_group_means: true
  sparse_output: true

eval:
  top_deg: 50

prior:
  pert_key: "perturbation"
  control_label: "control"
  kb: "dataset/kb/prior.json"
  use_llm: false
  min_conf: 0.5
  evidence_dim: 128
  encoder: "hash"
  model_name: null
  audit: "output/prior_audit.csv"

  # LLM safety
  llm_max_tokens: 512
  max_llm_calls: 50
  max_llm_tokens: 30000
  llm_cache: "output/llm_cache.json"
  llm_sleep: 0.0
  dry_run: false
