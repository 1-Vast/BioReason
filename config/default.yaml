# BioReason default configuration

project:
  name: "BioReason"
  task: "single-cell perturbation prediction"
  idea: "evidence-guided latent biological reasoning"

data:
  h5ad: ""
  label_key: "perturbation"
  control_label: "control"
  cell_type_key: "cell_type"
  dose_key: "dose"
  time_key: "time"
  batch_key: "batch"
  evidence_key: "evidence"
  target_mode: "group_mean"
  pair_by: "cell_type"
  use_control_as_input: true
  use_hvg: true
  n_hvg: 2000

eval:
  top_deg: 50
