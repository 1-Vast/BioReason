# BioReason model hyperparameters

model:
  name: "BioReason"
  input_dim: 2000
  dim: 256
  hidden: 512
  latent_steps: 8
  heads: 4
  dropout: 0.1

  # core ablations
  reason_mode: "transformer"     # transformer | mlp
  evidence_mode: "film"          # film | add | cross
  residual: true

  # perturbation
  pert_mode: "id"
  pert_agg: "mean"
  evidence_dim: null
  use_evidence_conf: true
